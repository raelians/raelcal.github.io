<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>8.6 신력 달력 - 수정판</title>
    <style>
        :root { --new-year: #ff4757; --accent: #2f3542; }
        body { font-family: 'Pretendard', sans-serif; display: flex; justify-content: center; padding: 40px; background: #f1f2f6; }
        .calendar { width: 450px; background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        .nav { background: var(--accent); color: white; padding: 25px; display: flex; justify-content: space-between; align-items: center; }
        .nav h2 { margin: 0; font-size: 1.4rem; }
        .nav button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 8px 15px; cursor: pointer; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 15px; }
        .day-label { text-align: center; font-weight: bold; color: #a4b0be; font-size: 0.8rem; padding-bottom: 15px; }
        .cell { height: 80px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .solar-num { font-size: 1.2rem; font-weight: 600; color: #2f3542; }
        .new-era-num { font-size: 0.75rem; color: #747d8c; margin-top: 4px; font-weight: 500; }
        .is-new-year { background: #fff0f0 !important; }
        .is-new-year .new-era-num { color: var(--new-year); font-weight: bold; }
        .dim { opacity: 0.2; }
        .today { border: 2px solid var(--accent); }
    </style>
</head>
<body>

<div class="calendar">
    <div class="nav">
        <button id="prevMonth">이전달</button>
        <h2 id="currentMonth"></h2>
        <button id="nextMonth">다음달</button>
    </div>
    <div class="grid" id="calendarGrid">
        <div class="day-label">SUN</div><div class="day-label">MON</div><div class="day-label">TUE</div>
        <div class="day-label">WED</div><div class="day-label">THU</div><div class="day-label">FRI</div><div class="day-label">SAT</div>
    </div>
</div>

<script>
    let viewDate = new Date();

    // 1. 정확한 신력 계산 함수
    function getCorrectNewEra(date) {
        const y = date.getFullYear();
        let refDate = new Date(y, 7, 6); // 당해 8월 6일
        
        if (date < refDate) {
            refDate = new Date(y - 1, 7, 6); // 아직 8/6 전이면 작년 8/6이 기준
        }

        // 기준일로부터 며칠 지났는지 계산
        const diffInMs = date.getTime() - refDate.getTime();
        const diffInDays = Math.floor(diffInMs / (1000 * 60 * 60 * 24));

        // 신력의 달별 일수 (양력의 달 크기를 8월부터 재배치)
        // 신력 1월(양력 8월 일부+9월 일부) 식으로 구성
        const daysInMonths = [31, 30, 31, 30, 31, 31, 28, 31, 30, 31, 30, 31];
        
        // 윤년 처리 (양력 2월이 포함되는 구간 확인)
        const checkLeapYear = refDate.getFullYear() + (refDate.getMonth() >= 7 ? 1 : 0);
        const isLeap = (checkLeapYear % 4 === 0 && checkLeapYear % 100 !== 0) || (checkLeapYear % 400 === 0);
        if (isLeap) daysInMonths[6] = 29; // 신력 7월쯤에 양력 2월이 걸림

        let remainingDays = diffInDays;
        let m = 0;
        while (m < 12 && remainingDays >= daysInMonths[m]) {
            remainingDays -= daysInMonths[m];
            m++;
        }

        return {
            month: m + 1,
            day: remainingDays + 1,
            isNewYear: diffInDays === 0
        };
    }

    // 2. 달력 그리기 함수
    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const monthLabel = document.getElementById('currentMonth');
        
        document.querySelectorAll('.cell').forEach(el => el.remove());

        const y = viewDate.getFullYear();
        const m = viewDate.getMonth();
        monthLabel.innerText = `${y}.${String(m + 1).padStart(2, '0')}`;

        const firstDay = new Date(y, m, 1).getDay();
        const lastDate = new Date(y, m + 1, 0).getDate();

        // 달력을 채우기 위한 루프 (전월 일부 포함)
        const startDate = new Date(y, m, 1 - firstDay);
        for (let i = 0; i < 42; i++) {
            const curr = new Date(startDate);
            curr.setDate(startDate.getDate() + i);
            
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (curr.getMonth() !== m) cell.classList.add('dim');
            if (curr.toDateString() === new Date().toDateString()) cell.classList.add('today');

            const newEra = getCorrectNewEra(curr);
            if (newEra.isNewYear) cell.classList.add('is-new-year');

            cell.innerHTML = `
                <span class="solar-num">${curr.getDate()}</span>
                <span class="new-era-num">aH. ${newEra.month}.${newEra.day}</span>
            `;
            grid.appendChild(cell);
        }
    }

    document.getElementById('prevMonth').onclick = () => { viewDate.setMonth(viewDate.getMonth() - 1); renderCalendar(); };
    document.getElementById('nextMonth').onclick = () => { viewDate.setMonth(viewDate.getMonth() + 1); renderCalendar(); };

    renderCalendar();
</script>
</body>
</html>
